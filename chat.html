<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>το χωλ · το μανταρίνι</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#000;color:#d4c4a8;font-family:'Courier New',Courier,monospace;}

canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

#top{
  position:fixed;top:0;left:0;right:0;z-index:10;
  background:rgba(0,0,0,0.9);border-bottom:1px solid #1a1a1a;
}
#top-row1{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.85rem 1.3rem 0.3rem;
}
#title{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:#7a6448;}
#controls{display:flex;align-items:center;gap:1rem;}
#snd{
  background:none;border:none;font-family:'Courier New',monospace;
  font-size:0.65rem;cursor:pointer;padding:0.2rem 0;
  letter-spacing:0.08em;text-transform:uppercase;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  color:#c8922a;min-width:44px;min-height:32px;
}
#snd.off{color:#444;}
#exit{
  font-size:0.65rem;color:#555;text-decoration:none;
  letter-spacing:0.1em;text-transform:uppercase;
  touch-action:manipulation;padding:0.2rem 0;min-height:32px;display:flex;align-items:center;
}
#presence{
  padding:0.1rem 1.3rem 0.7rem;
  font-size:0.78rem;color:#a08868;letter-spacing:0.02em;min-height:1.8rem;
}

#msgs{
  position:fixed;top:5.6rem;bottom:5.4rem;left:0;right:0;z-index:5;
  overflow-y:auto;padding:1rem 1.3rem;
  display:flex;flex-direction:column;gap:0.9rem;scroll-behavior:smooth;
}
#msgs::-webkit-scrollbar{width:2px;}
#msgs::-webkit-scrollbar-thumb{background:#1a1a1a;}

.m{font-size:0.88rem;line-height:1.8;word-break:break-word;color:#d4c4a8;
   animation:fi 0.6s ease forwards;opacity:0;}
@keyframes fi{to{opacity:1;}}
.m .h{margin-right:0.4rem;opacity:0.7;}
.m.me .h{opacity:1;}
.m.sy{color:#3a3a3a;font-size:0.63rem;font-style:italic;text-align:center;padding:0.1rem 0;}
.m a{color:#c8922a;text-decoration:underline;}

#typ{
  position:fixed;bottom:5.15rem;left:0;right:0;z-index:6;
  text-align:center;font-size:0.75rem;color:#333;height:1rem;letter-spacing:0.12em;
}

#iw{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:#000;border-top:1px solid #1a1a1a;
  padding:0.9rem 1.3rem 1rem;
}
#ir{display:flex;align-items:center;gap:0.7rem;max-width:700px;margin:0 auto;}
#dot{color:#c8922a;opacity:0.6;animation:bl 1.4s step-end infinite;flex-shrink:0;font-size:1rem;}
@keyframes bl{50%{opacity:0;}}
#inp{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Courier New',monospace;font-size:0.92rem;
  color:#d4c4a8;caret-color:#c8922a;min-width:0;
}
#inp::placeholder{color:#252525;}
#sbtn{
  background:none;border:1px solid #252525;font-family:'Courier New',monospace;
  font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:#555;
  cursor:pointer;padding:0.45rem 1rem;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  min-height:40px;min-width:64px;transition:border-color 0.15s,color 0.15s;
}
#sbtn:active{border-color:#c8922a;color:#c8922a;}

@media(max-width:600px){
  #msgs{padding:0.8rem 1rem;}
  #iw{padding:0.8rem 1rem 0.95rem;}
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="top">
  <div id="top-row1">
    <span id="title">το χωλ</span>
    <div id="controls">
      <button id="snd">♪ on</button>
      <a id="exit" href="index.html">← έξοδος</a>
    </div>
  </div>
  <div id="presence">·</div>
</div>

<div id="msgs"></div>
<div id="typ"></div>

<div id="iw">
  <div id="ir">
    <span id="dot">·</span>
    <input id="inp" type="text" placeholder="..." maxlength="400"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="sbtn">send</button>
  </div>
</div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
// ── CONFIG ──────────────────────────────────────────────────────────────
var KEY = 'Xu5R-Q.AmWohg:HXokYtIWRQAUWZdN4ReBRkhIRcxLw49-G2D8ZgK7u5w';
var CH  = 'mantarini-xol';
var MAX = 120;

// ── HANDLE ──────────────────────────────────────────────────────────────
var HH = ['still','awake','passing','elsewhere','near','across','late','almost',
  'outside','inside','between','after','before','again','quietly','briefly',
  'barely','half','just','here','there','once','maybe','nearly','softly',
  'dimly','slowly','always','never','often','seldom','tonight','already',
  'further','closer','apart','along','behind','ahead','away','back',
  'within','without','among','around','beneath','above','below','beyond',
  'through','during','since','until','while','though','unless','whether'];
var HC = ['#c8922a','#b87e22','#d4a040','#a86e1a','#e0b060','#c09030','#d49838','#aa7020'];
function hc(h){var n=0;for(var i=0;i<h.length;i++)n+=h.charCodeAt(i);return HC[n%HC.length];}
var me = sessionStorage.getItem('xol_h') || (function(){
  var h=HH[Math.floor(Math.random()*HH.length)];
  sessionStorage.setItem('xol_h',h); return h;
})();

// ── SOUND ────────────────────────────────────────────────────────────────
var SND = true;
var AC  = null;
var sndBtn = document.getElementById('snd');

function unlockAudio(){
  if(!AC) try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  if(AC && AC.state==='suspended') AC.resume();
}

// unlock on first interaction
document.addEventListener('touchstart', unlockAudio, {once:true, passive:true});
document.addEventListener('click',      unlockAudio, {once:true});

sndBtn.addEventListener('click', function(e){
  e.stopPropagation();
  SND = !SND;
  sndBtn.textContent = SND ? '♪ on' : '♪ off';
  sndBtn.className   = SND ? '' : 'off';
  unlockAudio();
});

function thud(){
  if(!SND || !AC) return;
  if(AC.state==='suspended'){ AC.resume(); return; }
  try{
    var o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type='sine';
    o.frequency.setValueAtTime(100, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(38, AC.currentTime+0.22);
    g.gain.setValueAtTime(0.09, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+0.22);
    o.start(); o.stop(AC.currentTime+0.22);
  }catch(e){}
}

// ── BACKGROUND ───────────────────────────────────────────────────────────
var cv   = document.getElementById('bg');
var ctx2 = null;
var bgP  = [];
var RAF  = null;
var BC   = ['.','·',':','*','o','°','+','∘','˙','`'];

function startBg(){
  // must call after page has dimensions
  ctx2 = cv.getContext('2d');
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  buildBg();
  if(RAF) cancelAnimationFrame(RAF);
  drawBg(0);
}

function buildBg(){
  bgP = [];
  var W=cv.width, H=cv.height;
  var n = Math.floor(W * H * 0.00022); // density
  var nc = 5 + Math.floor(Math.random()*7);
  var centers = [];
  for(var i=0;i<nc;i++) centers.push({
    x: (0.05+Math.random()*0.9)*W,
    y: (0.05+Math.random()*0.9)*H,
    rw: (0.04+Math.random()*0.15)*W,
    rh: (0.03+Math.random()*0.10)*H
  });
  for(var p=0;p<n;p++){
    var x,y;
    if(Math.random()<0.72){
      var c=centers[Math.floor(Math.random()*centers.length)];
      var a=Math.random()*Math.PI*2, d=Math.random();
      x = c.x + Math.cos(a)*c.rw*d;
      y = c.y + Math.sin(a)*c.rh*d;
    } else { x=Math.random()*W; y=Math.random()*H; }
    // clamp
    x=Math.max(0,Math.min(W-1,x));
    y=Math.max(0,Math.min(H-1,y));
    bgP.push({
      x:x, y:y,
      ch: BC[Math.floor(Math.random()*BC.length)],
      ph: Math.random()*Math.PI*2,
      spd: 0.2 + Math.random()*0.3,  // full cycle: 20–30s
      base: 0.1 + Math.random()*0.18,
      amp:  0.08+ Math.random()*0.12,
      r: 145+Math.floor(Math.random()*55),
      g: 95 +Math.floor(Math.random()*45),
      b: 25 +Math.floor(Math.random()*40)
    });
  }
}

function drawBg(ts){
  RAF = requestAnimationFrame(drawBg);
  var t = ts * 0.001;
  ctx2.clearRect(0,0,cv.width,cv.height);
  ctx2.font = '12px "Courier New",monospace';
  ctx2.textBaseline = 'top';
  for(var i=0;i<bgP.length;i++){
    var p=bgP[i];
    var op = p.base + Math.sin(t*p.spd+p.ph)*p.amp;
    op = op<0.01?0.01: op>0.55?0.55:op;
    ctx2.fillStyle='rgba('+p.r+','+p.g+','+p.b+','+op+')';
    ctx2.fillText(p.ch,p.x,p.y);
  }
}

window.addEventListener('resize', function(){
  cv.width=window.innerWidth; cv.height=window.innerHeight; buildBg();
});
setInterval(buildBg, 60000);

// start background after DOM layout is done
window.addEventListener('load', startBg);
// fallback: also try on DOMContentLoaded + small delay
document.addEventListener('DOMContentLoaded', function(){
  setTimeout(startBg, 50);
});

// ── MESSAGES ─────────────────────────────────────────────────────────────
var msgsEl = document.getElementById('msgs');
var typEl  = document.getElementById('typ');
var inpEl  = document.getElementById('inp');
var mc = 0;

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function lnk(t){return t.replace(/(https?:\/\/\S+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');}

function addMsg(d, own, hist){
  if(++mc>MAX && msgsEl.firstChild) msgsEl.removeChild(msgsEl.firstChild);
  var el=document.createElement('div');
  if(d.sys){
    el.className='m sy'; el.textContent=d.text;
  } else {
    el.className='m'+(own?' me':'');
    if(hist) el.style.opacity='0.38';
    var h=document.createElement('span');
    h.className='h'; h.textContent=d.handle+':'; h.style.color=hc(d.handle||'');
    el.appendChild(h);
    var s=document.createElement('span');
    s.innerHTML=' '+lnk(esc(d.text));
    el.appendChild(s);
    if(!own && !hist) thud();
  }
  msgsEl.appendChild(el);
  msgsEl.scrollTop=msgsEl.scrollHeight;
}

// ── TYPING ───────────────────────────────────────────────────────────────
var tT=null, tP=null;
function showTyp(){
  typEl.textContent='·'; clearTimeout(tT);
  tT=setTimeout(function(){typEl.textContent='';},2500);
}
inpEl.addEventListener('input',function(){
  if(!conn||!ch) return;
  clearTimeout(tP);
  tP=setTimeout(function(){ch.publish('typ',{h:me});},400);
});

// ── SILENCE ──────────────────────────────────────────────────────────────
var qT=[], sLv=0;
function sil(lv){
  sLv=lv;
  var tr=lv===0?'none':'opacity 7s ease';
  var ops=lv===0?[1,1,1]:lv===1?[0.75,1,1]:lv===2?[0.4,0.45,0.5]:[0.12,0.18,0.18];
  ['msgs','top','iw'].forEach(function(id,i){
    var el=document.getElementById(id);
    if(el){el.style.transition=tr;el.style.opacity=String(ops[i]);}
  });
}
function resetQ(){
  qT.forEach(clearTimeout); qT=[];
  if(sLv>0) sil(0); sLv=0;
  qT.push(setTimeout(function(){addMsg({sys:true,text:'το χωλ είναι ήσυχο'});sil(1);},3*60*1000));
  qT.push(setTimeout(function(){addMsg({sys:true,text:'κανείς δεν ήρθε απόψε'});sil(2);},10*60*1000));
  qT.push(setTimeout(function(){sil(3);},30*60*1000));
}

// ── PRESENCE ─────────────────────────────────────────────────────────────
var presEl = document.getElementById('presence');
function updPres(){
  if(!ch) return;
  ch.presence.get(function(err,members){
    if(err) return;
    var n=members.length;
    presEl.textContent = n===1?'1 άτομο εδώ':n+' άτομα εδώ';
  });
}

// ── ABLY ─────────────────────────────────────────────────────────────────
var ch=null, conn=false;
var ably=new Ably.Realtime({key:KEY, clientId:me});

ably.connection.on('connected',function(){
  conn=true;
  ch=ably.channels.get(CH);

  ch.history({limit:30},function(err,page){
    if(!err && page && page.items.length){
      page.items.reverse().forEach(function(m){
        if(m.name==='msg') addMsg(m.data, m.data.handle===me, true);
      });
      addMsg({sys:true,text:'· · ·'});
    }
  });

  ch.subscribe('msg',function(m){
    if(m.data.handle!==me){addMsg(m.data,false,false);resetQ();}
  });
  ch.subscribe('typ',function(m){
    if(m.data.h!==me) showTyp();
  });

  ch.presence.enter({handle:me});
  ch.presence.subscribe(function(msg){
    if(msg.clientId===me) return;
    if(msg.action==='enter'){addMsg({sys:true,text:'κάποιος μπήκε στο χωλ'});resetQ();}
    else if(msg.action==='leave') addMsg({sys:true,text:'κάποιος έφυγε'});
    updPres();
  });
  // wait for own presence to register
  setTimeout(updPres, 1000);
  resetQ();
});

ably.connection.on('disconnected',function(){
  conn=false; presEl.textContent='·';
  addMsg({sys:true,text:'αποσυνδέθηκες'});
});
ably.connection.on('failed',function(){
  addMsg({sys:true,text:'αδυναμία σύνδεσης'});
});

// ── SEND ─────────────────────────────────────────────────────────────────
function send(){
  var t=inpEl.value.trim();
  if(!t||!conn) return;
  var d={handle:me,text:t};
  ch.publish('msg',d);
  addMsg(d,true,false);
  resetQ(); inpEl.value=''; clearTimeout(tP);
}
document.getElementById('sbtn').addEventListener('click',function(e){
  e.stopPropagation(); send();
});
inpEl.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});
inpEl.focus();
document.addEventListener('click',function(e){
  if(e.target!==inpEl&&e.target.id!=='sbtn') inpEl.focus();
});
</script>
</body>
</html>
