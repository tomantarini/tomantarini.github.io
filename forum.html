<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>forum · το μανταρίνι</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:#fff;color:#111;font-family:'Courier New',Courier,monospace;}

/* ── HEADER ── */
#top{
  position:sticky;top:0;z-index:10;background:#fff;
  border-bottom:1px solid #eee;
  padding:0.7rem 1.6rem;
  display:flex;align-items:center;justify-content:space-between;
}
#top-left{display:flex;flex-direction:column;gap:0.02rem;}
#site-link{font-size:1.2rem;font-weight:normal;letter-spacing:.01em;font-family:Georgia,"Times New Roman",serif;line-height:1.3;color:#111;text-decoration:none;}
.orbit-link{color:#111;text-decoration:none;font-style:normal;}
.orbit-link:visited{color:#111;}
.orbit-link:hover{color:#c8922a;}
#page-title{font-size:0.72rem;color:#999;font-family:Georgia,"Times New Roman",serif;font-style:italic;}
#top-right{display:flex;align-items:center;gap:1.2rem;}
#username-display{font-size:0.72rem;color:#bbb;cursor:pointer;letter-spacing:0.04em;}
#username-display:hover{color:#555;}
#new-post-btn{background:none;border:none;font-family:'Courier New',monospace;font-size:0.72rem;color:#bbb;cursor:pointer;padding:0;letter-spacing:0.04em;-webkit-tap-highlight-color:transparent;}
#new-post-btn:hover{color:#333;}
#back-link{font-size:0.72rem;color:#bbb;text-decoration:none;letter-spacing:0.04em;}
#back-link:hover{color:#555;}
@media(max-width:600px){
  #site-link{font-size:1rem;}
  #top{padding:0.65rem 1rem;}
  #top-right{gap:0.8rem;}
  #username-display,#new-post-btn,#back-link{font-size:0.65rem;}
}

/* ── DOCUMENT ── */
#doc{
  max-width:640px;
  margin:0 auto;
  padding:3rem 1.6rem 8rem;
}
@media(max-width:600px){#doc{padding:2rem 1.2rem 6rem;}}

/* each contribution */
.entry{
  margin-bottom:2.8rem;
  position:relative;
}
.entry-handle{
  font-size:0.72rem;color:#bbb;
  margin-bottom:0.5rem;
  letter-spacing:0.04em;
  display:flex;align-items:baseline;gap:0.6rem;
}
.entry-handle .handle{color:#c8922a;}
.entry-handle .in-response{color:#ddd;font-size:0.65rem;}
.entry-handle .time{color:#ddd;font-size:0.65rem;}
.entry-body{
  font-size:0.95rem;line-height:1.85;color:#222;
  white-space:pre-wrap;word-break:break-word;
  font-family:Georgia,"Times New Roman",serif;
  cursor:pointer;
}
.entry-body:hover{color:#111;}
.entry.reply{
  margin-left:1.8rem;
  margin-bottom:1.8rem;
}
.entry.reply .entry-body{color:#555;font-size:0.9rem;}

/* reply hint on hover */
.entry-actions{
  display:none;
  margin-top:0.5rem;
}
.entry:hover .entry-actions{display:flex;}
.reply-btn{
  background:none;border:none;font-family:'Courier New',monospace;
  font-size:0.62rem;color:#ccc;cursor:pointer;padding:0;
  letter-spacing:0.06em;transition:color 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.reply-btn:hover{color:#c8922a;}

/* separator */
.sep{
  font-size:0.65rem;color:#e0e0e0;
  margin:2.4rem 0;
  letter-spacing:0.1em;
  user-select:none;
}

/* inline reply form */
.reply-form{
  display:none;
  margin-top:0.8rem;
  margin-left:1.8rem;
  border-left:1px solid #eee;
  padding-left:1rem;
}
.reply-form.open{display:block;}
.reply-form textarea{
  width:100%;border:none;outline:none;
  font-family:Georgia,serif;font-size:0.9rem;
  color:#111;background:transparent;
  resize:none;min-height:80px;line-height:1.75;
  caret-color:#c8922a;
}
.reply-form textarea::placeholder{color:#ddd;font-style:italic;}
.reply-form-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:0.4rem;
}
.reply-form-meta .posting-as{font-size:0.6rem;color:#ccc;letter-spacing:0.04em;}
.reply-form-meta .form-btns{display:flex;gap:0.5rem;}
.reply-form-meta button{
  background:none;border:none;font-family:'Courier New',monospace;
  font-size:0.6rem;color:#bbb;cursor:pointer;padding:0;
  letter-spacing:0.06em;transition:color 0.15s;
}
.reply-form-meta button.submit:hover{color:#111;}
.reply-form-meta button.cancel:hover{color:#999;}

/* new post form — fullscreen overlay */
#post-overlay{
  display:none;position:fixed;inset:0;z-index:50;
  background:#fff;
  padding:3rem 1.6rem;
  overflow-y:auto;
}
#post-overlay.open{display:block;}
#post-overlay-inner{max-width:640px;margin:0 auto;}
#post-overlay h2{font-size:0.65rem;color:#bbb;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:1.8rem;font-family:'Courier New',monospace;font-weight:normal;}
#post-overlay textarea{
  width:100%;border:none;outline:none;
  font-family:Georgia,serif;font-size:1rem;
  color:#111;background:transparent;
  resize:none;min-height:200px;line-height:1.85;
  caret-color:#c8922a;
}
#post-overlay textarea::placeholder{color:#ddd;font-style:italic;}
#post-overlay-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:1.4rem;
  padding-top:1rem;
  border-top:1px solid #eee;
}
#post-overlay-meta .posting-as{font-size:0.62rem;color:#ccc;letter-spacing:0.04em;}
#post-overlay-meta .btns{display:flex;gap:0.8rem;}
#post-overlay-meta button{
  background:none;border:none;font-family:'Courier New',monospace;
  font-size:0.62rem;color:#bbb;cursor:pointer;padding:0;
  letter-spacing:0.08em;transition:color 0.15s;
}
#post-overlay-meta button#po-submit:hover{color:#111;}

/* username modal */
.modal-bg{display:none;position:fixed;inset:0;z-index:100;background:rgba(255,255,255,0.97);align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{width:min(400px,90vw);padding:2rem;}
.modal h2{font-size:0.85rem;font-weight:normal;font-style:italic;color:#555;margin-bottom:1.4rem;font-family:Georgia,serif;}
.modal input{width:100%;border:none;border-bottom:1px solid #eee;font-family:'Courier New',monospace;font-size:0.88rem;padding:0.4rem 0;outline:none;background:transparent;color:#111;margin-bottom:1.4rem;}
.modal input::placeholder{color:#ddd;}
.modal-btns{display:flex;gap:0.8rem;}
.modal-btns button{background:none;border:none;font-family:'Courier New',monospace;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:#bbb;cursor:pointer;padding:0;transition:color 0.15s;}
.modal-btns button.primary{color:#111;}

/* loading / empty */
#status{padding:3rem 0;font-size:0.85rem;color:#ddd;font-style:italic;text-align:center;}

/* admin */
.admin-del{background:none;border:none;font-family:'Courier New',monospace;font-size:0.55rem;color:#eee;cursor:pointer;padding:0;margin-left:0.5rem;transition:color 0.15s;}
.admin-del:hover{color:#c00;}
</style>
</head>
<body>

<div id="top">
  <div id="top-left">
    <div id="site-link">το μανταρίνι <a href="ascii.html" class="orbit-link" style="text-decoration:none;color:#111;">(((◌)))</a></div>
    <span id="page-title">forum</span>
  </div>
  <div id="top-right">
    <span id="username-display">set name</span>
    <button id="new-post-btn">+ write</button>
    <a href="index.html" id="back-link">← back</a>
  </div>
</div>

<!-- the transcript -->
<div id="doc">
  <div id="status">loading...</div>
</div>

<!-- new post overlay -->
<div id="post-overlay">
  <div id="post-overlay-inner">
    <h2>new entry</h2>
    <textarea id="po-body" placeholder="a fragment, a question, an observation..."></textarea>
    <div id="post-overlay-meta">
      <span class="posting-as" id="po-posting-as"></span>
      <div class="btns">
        <button id="po-cancel">cancel</button>
        <button id="po-submit">post ↵</button>
      </div>
    </div>
  </div>
</div>

<!-- username modal -->
<div class="modal-bg" id="username-modal">
  <div class="modal">
    <h2>choose a name</h2>
    <input id="un-input" type="text" placeholder="name or pseudonym" maxlength="40">
    <div class="modal-btns">
      <button id="un-cancel">cancel</button>
      <button id="un-save" class="primary">save</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6FxPzTqCuI4PjhcE7dc8kfORVTf5V0kw",
  authDomain: "tomantarini-25865.firebaseapp.com",
  databaseURL: "https://tomantarini-25865-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tomantarini-25865",
  storageBucket: "tomantarini-25865.firebasestorage.app",
  messagingSenderId: "1033497517437",
  appId: "1:1033497517437:web:4259c9a200447d9c1c8014"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const ADMIN_KEY = 'rn3B31l9jOMp346euC7flQ';
const isAdmin = new URLSearchParams(window.location.search).get('admin') === ADMIN_KEY;

// ── USERNAME ──────────────────────────────────────────────────────────────
let username = localStorage.getItem('forum_username') || '';
const unDisplay = document.getElementById('username-display');
const unModal   = document.getElementById('username-modal');
const unInput   = document.getElementById('un-input');

function setUsername(name){
  username = name.trim();
  localStorage.setItem('forum_username', username);
  unDisplay.textContent = username || 'set name';
}
setUsername(username);

function showUsernameModal(cb){
  unInput.value = username;
  unModal.classList.add('open');
  setTimeout(()=> unInput.focus(), 50);
  if(cb) unModal._cb = cb;
}
unDisplay.addEventListener('click', ()=> showUsernameModal());
document.getElementById('un-save').addEventListener('click', ()=>{
  const v = unInput.value.trim(); if(!v) return;
  setUsername(v);
  unModal.classList.remove('open');
  if(unModal._cb){ unModal._cb(); unModal._cb=null; }
});
document.getElementById('un-cancel').addEventListener('click', ()=> unModal.classList.remove('open'));
unInput.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('un-save').click(); });

// ── HELPERS ───────────────────────────────────────────────────────────────
function esc(t){ return t?(t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')):''; }
function timeAgo(ts){
  if(!ts) return '';
  const diff=Date.now()-ts, m=Math.floor(diff/60000);
  if(m<1) return 'just now';
  if(m<60) return m+'m ago';
  const h=Math.floor(m/60);
  if(h<24) return h+'h ago';
  const d=Math.floor(h/24);
  if(d===1) return 'yesterday';
  if(d<7) return d+'d ago';
  return Math.floor(d/7)+'w ago';
}
function makeSep(){
  const chars=['.','·',':','~',"'",'.','·'];
  const pats=['·:·.','·:·','.:.','.·.'];
  let out=''; const len=40+Math.floor(Math.random()*20);
  while(out.length<len) out+=Math.random()<0.3?pats[Math.floor(Math.random()*pats.length)]:chars[Math.floor(Math.random()*chars.length)];
  return out.slice(0,len);
}

// ── RENDER ────────────────────────────────────────────────────────────────
let postsData={}, repliesData={};

function render(){
  const doc = document.getElementById('doc');
  doc.innerHTML='';
  const ids = Object.keys(postsData);

  if(ids.length===0){
    const s=document.createElement('div');
    s.id='status'; s.textContent='nothing yet. be the first.';
    doc.appendChild(s); return;
  }

  // sort: pinned first, then newest
  ids.sort((a,b)=>{
    const pa=postsData[a].pinned?1:0, pb=postsData[b].pinned?1:0;
    if(pb!==pa) return pb-pa;
    return (postsData[b].ts||0)-(postsData[a].ts||0);
  });

  ids.forEach((id, i)=>{
    const post = postsData[id];
    const replies = repliesData[id] ? Object.entries(repliesData[id]).sort((a,b)=>(a[1].ts||0)-(b[1].ts||0)) : [];

    // post entry
    const entry = makeEntry(id, post, null, null);
    doc.appendChild(entry);

    // reply form for this post
    const rf = makeReplyForm(id);
    doc.appendChild(rf);

    // wire reply button
    entry.querySelector('.reply-btn').addEventListener('click', e=>{
      e.stopPropagation();
      if(!username){ showUsernameModal(()=>{ rf.classList.add('open'); rf.querySelector('textarea').focus(); }); return; }
      rf.classList.toggle('open');
      if(rf.classList.contains('open')) rf.querySelector('textarea').focus();
    });

    // replies
    replies.forEach(([rid, r])=>{
      const re = makeEntry(id, r, rid, id);
      doc.appendChild(re);
    });

    // separator between posts (not after last)
    if(i < ids.length-1){
      const sep = document.createElement('div');
      sep.className='sep'; sep.textContent=makeSep();
      doc.appendChild(sep);
    }
  });

  // admin bar
  if(isAdmin && !document.getElementById('admin-bar')){
    const bar=document.createElement('div');
    bar.id='admin-bar';
    bar.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#111;color:#fff;font-family:Courier New,monospace;font-size:0.55rem;text-align:center;padding:0.3rem;z-index:50;letter-spacing:0.1em;';
    bar.textContent='admin mode';
    document.body.appendChild(bar);
  }
}

function makeEntry(postId, data, replyId, parentId){
  const el = document.createElement('div');
  el.className = 'entry' + (replyId ? ' reply' : '');
  if(replyId) el.dataset.rid = replyId;

  // handle line
  const handleRow = document.createElement('div');
  handleRow.className = 'entry-handle';
  const hSpan = document.createElement('span');
  hSpan.className = 'handle';
  hSpan.textContent = '['+esc(data.author||'anon')+']';
  handleRow.appendChild(hSpan);
  if(replyId){
    const ir = document.createElement('span');
    ir.className = 'in-response';
    ir.textContent = 'in response';
    handleRow.appendChild(ir);
  }
  if(data.pinned){
    const pin=document.createElement('span');
    pin.style.cssText='color:#c8922a;font-size:0.65rem;';
    pin.textContent='★';
    handleRow.appendChild(pin);
  }
  const tSpan = document.createElement('span');
  tSpan.className = 'time';
  tSpan.textContent = timeAgo(data.ts);
  handleRow.appendChild(tSpan);

  // admin controls in handle row
  if(isAdmin){
    const del=document.createElement('button');
    del.className='admin-del';
    del.textContent='× delete';
    del.addEventListener('click', e=>{
      e.stopPropagation();
      if(replyId){
        if(confirm('Delete reply?')) remove(ref(db,'replies/'+postId+'/'+replyId));
      } else {
        if(confirm('Delete post and all replies?')){
          remove(ref(db,'posts/'+postId));
          remove(ref(db,'replies/'+postId));
        }
      }
    });
    if(!replyId){
      const pin=document.createElement('button');
      pin.className='admin-del';
      pin.style.color=data.pinned?'#c8922a':'#eee';
      pin.textContent=data.pinned?'★ unpin':'☆ pin';
      pin.addEventListener('click',e=>{ e.stopPropagation(); set(ref(db,'posts/'+postId+'/pinned'),!data.pinned); });
      handleRow.appendChild(pin);
    }
    handleRow.appendChild(del);
  }
  el.appendChild(handleRow);

  // body
  const body = document.createElement('div');
  body.className = 'entry-body';
  body.textContent = data.body||'';
  el.appendChild(body);

  // actions (reply button — only on posts)
  if(!replyId){
    const actions = document.createElement('div');
    actions.className = 'entry-actions';
    const rb = document.createElement('button');
    rb.className = 'reply-btn';
    rb.textContent = 'reply ↩';
    actions.appendChild(rb);
    el.appendChild(actions);
  }

  return el;
}

function makeReplyForm(postId){
  const rf = document.createElement('div');
  rf.className = 'reply-form';
  rf.dataset.post = postId;
  const ta = document.createElement('textarea');
  ta.placeholder='write a reply...';
  const meta = document.createElement('div');
  meta.className='reply-form-meta';
  const pa = document.createElement('span');
  pa.className='posting-as';
  pa.textContent=username?'['+username+']':'';
  const btns = document.createElement('div');
  btns.className='form-btns';
  const cancel=document.createElement('button');
  cancel.className='cancel'; cancel.textContent='cancel';
  cancel.addEventListener('click',()=>{ rf.classList.remove('open'); ta.value=''; });
  const submit=document.createElement('button');
  submit.className='submit'; submit.textContent='post ↵';
  submit.addEventListener('click',()=>{
    const text=ta.value.trim(); if(!text) return;
    if(text.length>800){ alert('Reply too long (max 800 characters)'); return; }
    if(!username){ showUsernameModal(()=>submit.click()); return; }
    push(ref(db,'replies/'+postId),{body:text,author:username,ts:serverTimestamp()});
    ta.value=''; rf.classList.remove('open');
  });
  ta.addEventListener('keydown',e=>{ if(e.key==='Enter'&&e.metaKey) submit.click(); });
  btns.appendChild(cancel); btns.appendChild(submit);
  meta.appendChild(pa); meta.appendChild(btns);
  rf.appendChild(ta); rf.appendChild(meta);
  return rf;
}

// ── NEW POST ──────────────────────────────────────────────────────────────
const postOverlay = document.getElementById('post-overlay');
document.getElementById('new-post-btn').addEventListener('click',()=>{
  if(!username){ showUsernameModal(()=>{ postOverlay.classList.add('open'); document.getElementById('po-body').focus(); }); return; }
  document.getElementById('po-posting-as').textContent='['+username+']';
  postOverlay.classList.add('open');
  setTimeout(()=>document.getElementById('po-body').focus(),50);
});
document.getElementById('po-cancel').addEventListener('click',()=>{
  postOverlay.classList.remove('open');
  document.getElementById('po-body').value='';
});
document.getElementById('po-submit').addEventListener('click',()=>{
  const body=document.getElementById('po-body').value.trim();
  if(!body) return;
  if(body.length>1500){ alert('Post too long (max 1500 characters)'); return; }
  if(!username){ showUsernameModal(()=>document.getElementById('po-submit').click()); return; }
  push(ref(db,'posts'),{body,author:username,ts:serverTimestamp()});
  document.getElementById('po-body').value='';
  postOverlay.classList.remove('open');
});
document.getElementById('po-body').addEventListener('keydown',e=>{ if(e.key==='Escape') document.getElementById('po-cancel').click(); });

// ── DATA ──────────────────────────────────────────────────────────────────
let postsLoaded=false, repliesLoaded=false;
const loadTimeout=setTimeout(()=>{
  if(!postsLoaded){
    document.getElementById('doc').innerHTML='<div id="status" style="color:#c00;">could not connect · check firebase rules</div>';
  }
},8000);

function refresh(){
  if(postsLoaded&&repliesLoaded){ clearTimeout(loadTimeout); render(); }
}
onValue(ref(db,'posts'),snap=>{ postsData=snap.val()||{}; postsLoaded=true; refresh(); },
  err=>{ document.getElementById('doc').innerHTML='<div id="status" style="color:#c00;">'+err.message+'</div>'; });
onValue(ref(db,'replies'),snap=>{ repliesData=snap.val()||{}; repliesLoaded=true; refresh(); });
</script>
</body>
</html>
