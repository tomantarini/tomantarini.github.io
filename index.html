<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>το μανταρίνι</title>
<style>
:root{--bg:#fff;--text:#000;--accent:#f28c28;--border:#000;--muted:#777;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Georgia,"Times New Roman",serif;overflow-x:hidden;padding-bottom:0;}
.page{max-width:1120px;margin:0 auto;padding:14px 12px 0;}
.title{margin:0 0 20px 0;font-size:1.2rem;font-weight:normal;letter-spacing:.01em;font-family:Georgia,"Times New Roman",serif;line-height:1.3;}
.orbit-link{color:inherit;text-decoration:none;cursor:pointer;font-family:Georgia,"Times New Roman",serif;font-size:inherit;font-weight:normal;font-style:normal;}
.orbit-link:hover{color:var(--accent);}
.field{position:relative;}

/* Lines */
.line{display:block;white-space:pre;overflow:hidden;line-height:1.62;font-size:17px;color:#595959;font-family:'Courier New',Courier,monospace;width:100%;}
.line+.line{margin-top:.6rem;}

/* Triggers — Georgia over the monospace field */
.trigger{display:inline;cursor:pointer;color:#111;font-family:Georgia,"Times New Roman",serif;font-size:1.15em;line-height:1.2;background:none;border:none;padding:0;font-weight:500;white-space:pre;}
.trigger:hover{color:var(--accent);}
.trigger.active{color:var(--accent);text-decoration:underline;text-underline-offset:2px;}

/* Panel */
.panel-wrap{display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:clamp(60px,10vh,120px);width:min(1020px, calc(100vw - 20px));z-index:20;}
.panel-wrap.open{display:block;}
.panel-shell{background:#fff;border:1px solid var(--border);overflow-y:scroll;overflow-x:hidden;max-height:min(72vh, calc(100vh - 160px));-webkit-overflow-scrolling:touch;position:relative;}
.panel-inner{padding:16px 16px 18px;position:relative;}
.panel-close-bar{display:flex;justify-content:flex-end;padding:6px 10px;position:sticky;top:0;background:#fff;z-index:5;border-bottom:1px solid #eee;}
.panel-type{margin:0 0 6px 0;color:var(--muted);font-size:.82rem;}
.panel-text{margin:0 0 10px 0;line-height:1.75;font-size:1.05rem;white-space:pre-wrap;word-break:break-word;}
.panel-links{margin:6px 0 0 0;font-size:.95rem;}
.panel-links a{color:var(--accent);text-decoration:underline;}
.close-btn{background:none;border:none;font:inherit;font-size:.9rem;color:var(--muted);cursor:pointer;padding:0;}
.close-btn:hover{color:var(--text);}
.panel-shell::-webkit-scrollbar{width:6px;}
.panel-shell::-webkit-scrollbar-track{background:#f0f0f0;}
.panel-shell::-webkit-scrollbar-thumb{background:#999;border-radius:3px;}
.panel-shell::-webkit-scrollbar-thumb:hover{background:#555;}

/* Image in panel */
.panel-img{width:100%;height:auto;border:1px solid #000;display:block;margin-top:10px;}

/* Loading / error state */
.field-msg{color:var(--muted);font-size:.9rem;padding:20px 0;}

@media (max-width:700px){
  .page{padding:12px 10px 0;}
  .title{font-size:1rem;}
  .line{font-size:13px;line-height:1.55;white-space:pre;}
  .trigger{font-size:1.2em;}
  .panel-wrap{width:calc(100vw - 12px);bottom:clamp(40px,8vh,80px);}
  .panel-shell{max-height:min(78vh, calc(100vh - 120px));}
  .panel-inner{padding:12px 12px 14px;}
  .panel-text{font-size:.92rem;}
}
</style>
</head>
<body>
<main class="page">
  <div class="title">το μανταρίνι <a href="ascii.html" class="orbit-link">(((◌)))</a></div>
  <section class="field" id="field"></section>
</main>

<div class="panel-wrap" id="panel-wrap">
  <div class="panel-shell" id="panel-shell">
    <div class="panel-close-bar">
      <button class="close-btn" id="close-btn" aria-label="κλείσιμο">κλείσιμο</button>
    </div>
    <div class="panel-inner">
      <div id="panel-body"></div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR_L3BRTS15mXDYMn01jC63svihZjidfiwFuZYA1D50_1wBMcWu1th38yZgvMgzEVtDchLmAHNpVSle/pub?output=csv';

// Symbol pool — single chars only, so cursor tracking stays exact
const SYMBOLS = ['\\','/','{','}','[',']','|','<','>','+','-','~','*','?',':',';',',','.','^','_','`','"',"'",'=','#','%','&'];
// Multi-char decorative clusters injected whole, tracked by actual length
const CLUSTERS = ['[[]]','{::}','`^`','{_}','=-=','|-|','<//>', '/\\', '<_>'];

// ─── STATE ─────────────────────────────────────────────────────────────────
let entries = [];
let ordered = []; // reversed entries — newest first
let driftInterval = null;
let driftPaused = false;
let activeId = null;

// ─── CSV PARSE ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  // Parse entire CSV character by character so quoted newlines are handled
  const rows = [];
  let cur = '', inQ = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQ && text[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      row.push(cur); cur = '';
    } else if ((c === '\n' || c === '\r') && !inQ) {
      if (c === '\r' && text[i+1] === '\n') i++; // skip \r\n
      row.push(cur); cur = '';
      if (row.some(v => v.trim())) rows.push(row);
      row = [];
    } else {
      cur += c;
    }
  }
  row.push(cur);
  if (row.some(v => v.trim())) rows.push(row);

  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim().toLowerCase().replace(/\s+/g, ''));
  const results = [];
  for (let i = 1; i < rows.length; i++) {
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (rows[i][idx] || '').trim(); });
    // 'linklabel' handles both 'linklabel' and 'link label'
    if (!obj.linklabel && obj['link label']) obj.linklabel = obj['link label'];
    if (obj.label && (!obj.publish || obj.publish.toLowerCase() !== 'false')) {
      results.push(obj);
    }
  }
  return results;
}

function randomSymbol(rng) {
  return SYMBOLS[Math.floor(rng() * SYMBOLS.length)];
}
function randomCluster(rng) {
  return CLUSTERS[Math.floor(rng() * CLUSTERS.length)];
}

// seeded RNG so layout is stable per session
function makeRng(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function getLineLen() {
  const page = document.querySelector('.page');
  const w = page ? page.clientWidth - 24 : window.innerWidth - 24;
  const isMobile = window.innerWidth <= 700;
  const charW = isMobile ? 7.8 : 10.2; // Courier New at 13px / 17px
  return Math.max(40, Math.floor(w / charW));
}

function buildField(e) {
  entries = e;
  ordered = [...e].reverse(); // newest first (index 0 = most recent)
  const LINE_LEN = getLineLen();
  const NUM_LINES = Math.max(40, Math.ceil((window.innerHeight * 2.2) / 30));
  const rng = makeRng(42);
  const positions = ordered.length > 0 ? assignPositions(ordered.length, NUM_LINES, rng, LINE_LEN) : [];

  const field = document.getElementById('field');
  if (!field) return;
  field.innerHTML = '';

  for (let li = 0; li < NUM_LINES; li++) {
    const lineDiv = document.createElement('div');
    lineDiv.className = 'line';

    const entriesOnLine = positions.filter(p => p.line === li);
    entriesOnLine.sort((a, b) => a.col - b.col);

    let content = '';
    let cursorPos = 0;

    for (const ep of entriesOnLine) {
      const entry = ordered[ep.entryIdx];
      const label = wrapLabel(entry);
      const insertAt = Math.min(ep.col, LINE_LEN - label.length - 2);
      while (cursorPos < insertAt) {
        const remaining = insertAt - cursorPos;
        if (remaining >= 4 && rng() < 0.07) {
          const cl = randomCluster(rng);
          if (cursorPos + cl.length <= insertAt) { content += cl; cursorPos += cl.length; continue; }
        }
        if (remaining > 2 && rng() < 0.10) { content += ' '; cursorPos += 1; continue; }
        content += randomSymbol(rng);
        cursorPos += 1;
      }
      content += `\x00${ep.entryIdx}\x00`;
      cursorPos += label.length;
    }

    while (cursorPos < LINE_LEN) {
      const remaining = LINE_LEN - cursorPos;
      if (remaining >= 4 && rng() < 0.07) {
        const cl = randomCluster(rng);
        if (cursorPos + cl.length <= LINE_LEN) { content += cl; cursorPos += cl.length; continue; }
      }
      if (remaining > 2 && rng() < 0.10) { content += ' '; cursorPos += 1; continue; }
      content += randomSymbol(rng);
      cursorPos += 1;
    }

    buildLineDOM(lineDiv, content);
    field.appendChild(lineDiv);
  }
}

function buildLineDOM(lineDiv, content) {
  const parts = content.split('\x00');
  for (let i = 0; i < parts.length; i++) {
    if (i % 2 === 0) {
      if (parts[i]) lineDiv.appendChild(document.createTextNode(parts[i]));
    } else {
      const idx = parseInt(parts[i], 10);
      const entry = ordered[idx];
      const btn = document.createElement('button');
      btn.className = 'trigger';
      btn.textContent = wrapLabel(entry);
      btn.dataset.id = idx;
      btn.addEventListener('click', () => openPanel(idx));
      lineDiv.appendChild(btn);
    }
  }
}

function assignPositions(count, numLines, rng, lineLen) {
  const numBands = 5;
  const bandW = Math.floor(lineLen / numBands);

  return Array.from({length: count}, (_, i) => {
    // i=0 is newest → top of page (low line numbers)
    // i=count-1 is oldest → bottom (high line numbers)
    const progress = count > 1 ? i / (count - 1) : 0;
    const OFFSET = 3; // never place in first 3 lines
    const lineZone = OFFSET + Math.floor(progress * (numLines - 1 - OFFSET));
    const spread = Math.ceil(numLines * 0.10);
    const line = Math.min(numLines - 1, Math.max(OFFSET, lineZone + Math.floor((rng() - 0.5) * spread)));

    const band = (i * 2 + Math.floor(rng() * 2)) % numBands;
    const bandStart = band * bandW;
    const bandEnd = (band === numBands - 1) ? lineLen - 15 : bandStart + bandW - 5;
    const col = bandStart + Math.floor(rng() * Math.max(1, bandEnd - bandStart));
    return { line, col, entryIdx: i };
  });
}

// ─── LABEL WRAPPING ─────────────────────────────────────────────────────────
// Wraps label in parentheses based on content length
// < 100 chars  → (label)
// 100–300      → ((label))
// 300–600      → (((label)))
// 600+         → ((((label))))
function wrapLabel(entry) {
  const raw = entry.label || '';
  // if already wrapped (has parens), use as-is
  if (raw.startsWith('(')) return raw;
  const len = (entry.content || '').length;
  if (len < 100)  return `(${raw})`;
  if (len < 300)  return `((${raw}))`;
  if (len < 600)  return `(((${raw})))`;
  return `((((${raw}))))`;
}
function startDrift() {
  if (driftInterval) clearInterval(driftInterval);
  driftInterval = setInterval(() => {
    if (driftPaused) return;
    const lines = document.querySelectorAll('.line');
    if (!lines.length) return;
    // shift 1–3 random lines slightly
    const count = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      const line = lines[Math.floor(Math.random() * lines.length)];
      // find text nodes and nudge one character
      const textNodes = [];
      line.childNodes.forEach(n => { if (n.nodeType === 3 && n.textContent.trim()) textNodes.push(n); });
      if (!textNodes.length) continue;
      const tn = textNodes[Math.floor(Math.random() * textNodes.length)];
      const t = tn.textContent;
      if (t.length < 3) continue;
      const pos = 1 + Math.floor(Math.random() * (t.length - 2));
      const sym = SYMBOLS[Math.floor(Math.random() * (SYMBOLS.length - 5))]; // short symbols only
      tn.textContent = t.slice(0, pos) + sym[0] + t.slice(pos + 1);
    }
  }, 7000 + Math.random() * 4000);
}

// ─── PANEL ─────────────────────────────────────────────────────────────────
function openPanel(idx) {
  const entry = ordered[idx];
  if (!entry) return;

  document.querySelectorAll('.trigger.active').forEach(t => t.classList.remove('active'));
  document.querySelectorAll(`.trigger[data-id="${idx}"]`).forEach(t => t.classList.add('active'));

  activeId = idx;
  driftPaused = true;

  const body = document.getElementById('panel-body');
  body.innerHTML = '';

  if (entry.content) {
    const div = document.createElement('div');
    div.className = 'panel-text';
    // use textContent so actual newlines render via white-space:pre-wrap
    div.textContent = entry.content.replace(/\\n/g, '\n');
    body.appendChild(div);
  }

  if (entry.image) {
    const img = document.createElement('img');
    img.src = entry.image;
    img.alt = entry.label || '';
    img.className = 'panel-img';
    body.appendChild(img);
  }

  if (entry.link) {
    const p = document.createElement('p');
    p.className = 'panel-links';
    const pairs = entry.link.split('|').map(s => s.trim()).filter(Boolean);
    pairs.forEach((pair, i) => {
      const parts = pair.split('::');
      const url = parts[1] ? parts[1].trim() : parts[0].trim();
      const label = parts[1] ? parts[0].trim() : (entry.linklabel || url);
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.textContent = label;
      p.appendChild(a);
      if (i < pairs.length - 1) p.appendChild(document.createTextNode(', '));
    });
    body.appendChild(p);
  }

  const shell = document.getElementById('panel-shell');
  shell.scrollTop = 0;
  document.getElementById('panel-wrap').classList.add('open');
}

function closePanel() {
  document.getElementById('panel-wrap').classList.remove('open');
  document.querySelectorAll('.trigger.active').forEach(t => t.classList.remove('active'));
  activeId = null;
  driftPaused = false;
}

// ─── INIT ───────────────────────────────────────────────────────────────────
document.getElementById('close-btn').addEventListener('click', closePanel);

// rebuild field on resize (debounced)
let resizeTimer;
let lastWidth = window.innerWidth;
window.addEventListener('resize', () => {
  const currentWidth = window.innerWidth;
  if (currentWidth === lastWidth) return; // height-only change, ignore
  lastWidth = currentWidth;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => buildField(entries), 250);
});

// close on outside click
document.addEventListener('click', e => {
  const wrap = document.getElementById('panel-wrap');
  if (activeId !== null && !wrap.contains(e.target) && !e.target.classList.contains('trigger')) {
    closePanel();
  }
});

async function init() {
  try {
    const proxy = 'https://corsproxy.io/?' + encodeURIComponent(CSV_URL);
    const res = await fetch(proxy);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    entries = parseCSV(text);
    if (entries.length) buildField(entries);
  } catch (e) {
    console.error(e);
  }
}

// build field immediately with symbols
buildField([]);
startDrift();
// fetch entries in background
init();

</script>
</body>
</html>
