<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zettel · το μανταρίνι</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--text:#111;--faint:#eee;--mid:#888;
  --amber:#c8922a;--node:#111;--edge:#ddd;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Georgia,"Times New Roman",serif;}

/* ── HEADER ── */
#top{
  position:fixed;top:0;left:0;right:0;z-index:20;
  background:#fff;border-bottom:1px solid var(--faint);
  padding:0.7rem 1.4rem;
  display:flex;align-items:center;justify-content:space-between;
}
#top-left{display:flex;flex-direction:column;gap:0.02rem;}
#site-link{font-size:1.2rem;font-weight:normal;letter-spacing:.01em;font-family:Georgia,"Times New Roman",serif;line-height:1.3;color:#111;text-decoration:none;}
.orbit-link{color:#111;text-decoration:none;}
.orbit-link:visited{color:#111;}
.orbit-link:hover{color:var(--amber);}
#page-title{font-size:0.72rem;color:#999;font-family:Georgia,"Times New Roman",serif;font-style:italic;}
#top-right{display:flex;align-items:center;gap:1.2rem;}
.nav-btn{background:none;border:none;font-family:Georgia,"Times New Roman",serif;font-style:italic;font-size:0.78rem;color:#aaa;cursor:pointer;padding:0;transition:color 0.15s;text-decoration:none;display:inline;}
.nav-btn:hover,.nav-btn.active{color:#111;}
.nav-btn.active{color:#111;text-decoration:underline;text-underline-offset:3px;}
@media(max-width:600px){
  #site-link{font-size:1rem;}
  #top{padding:0.65rem 1rem;}
  #top-right{gap:0.8rem;}
  .nav-btn{font-size:0.7rem;}
}

/* ── VIEWS ── */
#view-transcript{display:none;position:fixed;top:3rem;bottom:0;left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#view-web{display:none;position:fixed;top:3rem;bottom:0;left:0;right:0;overflow:hidden;}

/* ── TRANSCRIPT ── */
#transcript-inner{max-width:640px;margin:0 auto;padding:2.5rem 1.4rem 6rem;}
.zt-entry{margin-bottom:1.6rem;position:relative;}
.zt-id{font-family:'Courier New',monospace;font-size:0.6rem;color:#ddd;letter-spacing:0.08em;margin-bottom:0.3rem;display:flex;align-items:center;gap:0.6rem;}
.zt-id .zid{color:var(--amber);cursor:pointer;user-select:all;}
.zt-id .zid:hover{text-decoration:underline;}
.zt-type{font-family:'Courier New',monospace;font-size:0.55rem;color:#ddd;letter-spacing:0.1em;text-transform:uppercase;}
.zt-links-to{font-family:'Courier New',monospace;font-size:0.58rem;color:#ccc;margin-bottom:0.4rem;}
.zt-links-to a{color:#bbb;text-decoration:none;cursor:pointer;}
.zt-links-to a:hover{color:var(--amber);}
.zt-title{font-size:1.1rem;font-weight:normal;color:#111;margin-bottom:0.5rem;line-height:1.35;}
.zt-body{font-size:0.92rem;line-height:1.8;color:#333;white-space:pre-wrap;word-break:break-word;margin-bottom:0.7rem;}
.zt-meta{font-family:'Courier New',monospace;font-size:0.6rem;color:#ccc;letter-spacing:0.03em;display:flex;gap:0.8rem;flex-wrap:wrap;}
.zt-meta .author{color:#bbb;}
.zt-meta .keywords span{color:#bbb;}
.zt-responses{margin-top:0.8rem;font-family:'Courier New',monospace;font-size:0.58rem;color:#ccc;letter-spacing:0.04em;}
.zt-responses a{color:#bbb;text-decoration:none;cursor:pointer;margin-right:0.4rem;}
.zt-responses a:hover{color:var(--amber);}
.zt-sep{color:#e8e8e8;font-family:'Courier New',monospace;font-size:0.6rem;margin:2rem 0;letter-spacing:0.06em;user-select:none;}

/* ── WEB VIEW ── */
#web-svg{width:100%;height:100%;}
.node-circle{fill:#fff;stroke:var(--node);stroke-width:1px;cursor:pointer;transition:stroke 0.15s;}
.node-circle:hover{stroke:var(--amber);}
.node-circle.highlighted{stroke:var(--amber);fill:#fff8f0;}
.node-label{font-family:Georgia,"Times New Roman",serif;font-size:10px;fill:#555;pointer-events:none;line-height:1.3;}
@media(max-width:600px){.node-label{font-size:11px;}}
.node-label.highlighted{fill:#111;}
.link-line{stroke:var(--edge);stroke-width:1px;fill:none;}
.link-line.highlighted{stroke:var(--amber);stroke-width:1.5px;}

/* ── SIDE PANEL (web view) ── */
#side-panel{
  display:none;position:fixed;top:3rem;right:0;bottom:0;
  width:min(380px,100vw);z-index:15;
  background:#fff;border-left:1px solid var(--faint);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
@media(max-width:600px){
  #side-panel{
    top:auto;left:0;right:0;bottom:0;width:100%;
    height:55vh;border-left:none;border-top:1px solid var(--faint);
  }
  #sp-inner{padding:1rem 1.2rem 2rem;}
}
#side-panel.open{display:block;}
#sp-inner{padding:1.6rem;}
#sp-close{background:none;border:none;font-family:'Courier New',monospace;font-size:0.6rem;letter-spacing:0.1em;color:#aaa;cursor:pointer;margin-bottom:1.2rem;display:block;text-align:right;width:100%;}
#sp-close:hover{color:#111;}
#sp-id{font-family:'Courier New',monospace;font-size:0.65rem;color:var(--amber);letter-spacing:0.08em;margin-bottom:0.4rem;}
#sp-type{font-family:'Courier New',monospace;font-size:0.55rem;color:#ddd;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.8rem;}
#sp-links{font-family:'Courier New',monospace;font-size:0.62rem;color:#ccc;margin-bottom:0.8rem;}
#sp-links a{color:#bbb;cursor:pointer;text-decoration:none;}
#sp-links a:hover{color:var(--amber);}
#sp-title{font-size:1.1rem;font-weight:normal;color:#111;margin-bottom:0.6rem;line-height:1.35;}
#sp-body{font-size:0.9rem;line-height:1.78;color:#333;white-space:pre-wrap;word-break:break-word;margin-bottom:0.9rem;}
#sp-meta{font-family:'Courier New',monospace;font-size:0.6rem;color:#ccc;display:flex;gap:0.8rem;flex-wrap:wrap;margin-bottom:0.8rem;}
#sp-meta .author{color:#bbb;}
#sp-responses{font-family:'Courier New',monospace;font-size:0.6rem;color:#ccc;}
#sp-responses a{color:#bbb;cursor:pointer;text-decoration:none;margin-right:0.4rem;}
#sp-responses a:hover{color:var(--amber);}

/* loading */
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-style:italic;color:#ccc;font-size:0.9rem;}

/* web hint */
#web-hint{
  position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);
  font-family:'Courier New',monospace;font-size:0.6rem;color:#ccc;
  letter-spacing:0.1em;text-transform:uppercase;
  pointer-events:none;transition:opacity 0.6s ease;
  white-space:nowrap;
}
</style>

<body>

<div id="top">
  <div id="top-left">
    <div id="site-link"><a href="zettel.html" style="text-decoration:none;color:inherit;">το</a> μανταρίνι <a href="ascii.html" class="orbit-link" style="text-decoration:none;color:#111;">(((◌)))</a></div>
    <span id="page-title">zettelkasten</span>
  </div>
  <div id="top-right">
    <button class="nav-btn active" id="btn-transcript">transcript</button>
    <button class="nav-btn" id="btn-web">web</button>
    <a href="index.html" class="nav-btn">← back</a>
  </div>
</div>

<div id="loading">loading...</div>
<div id="view-transcript"><div id="transcript-inner"></div></div>
<div id="view-web">
  <svg id="web-svg"></svg>
  <div id="web-hint">drag to move · scroll to zoom · click to read</div>
</div>
<div id="side-panel">
  <div id="sp-inner">
    <button id="sp-close">close ×</button>
    <div id="sp-id"></div>
    <div id="sp-type"></div>
    <div id="sp-links"></div>
    <div id="sp-title"></div>
    <div id="sp-body"></div>
    <div id="sp-meta"></div>
    <div id="sp-responses"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR_L3BRTS15mXDYMn01jC63svihZjidfiwFuZYA1D50_1wBMcWu1th38yZgvMgzEVtDchLmAHNpVSle/pub?output=csv';
const PROXY   = 'https://corsproxy.io/?' + encodeURIComponent(CSV_URL);

// ── ID GENERATION ──────────────────────────────────────────────────────────
function hashStr(s){
  let h=0;
  for(let i=0;i<s.length;i++){ h=(Math.imul(31,h)+s.charCodeAt(i))|0; }
  return Math.abs(h);
}
function makeId(entry, index){
  // 3-char alphanumeric ID based on content hash + index
  const CHARS='abcdefghjkmnpqrstuvwxyz23456789';
  const base=hashStr((entry.label||'')+(entry.body||'')+index);
  return CHARS[base%CHARS.length]+CHARS[Math.floor(base/CHARS.length)%CHARS.length]+CHARS[index%CHARS.length];
}

// ── CSV PARSE ──────────────────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.split('\n');
  if(!lines.length) return [];
  const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9]/g,''));
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const vals=[], line=lines[i]; let cur='', inq=false;
    for(let c=0;c<line.length;c++){
      if(line[c]==='"'){ inq=!inq; }
      else if(line[c]===','&&!inq){ vals.push(cur.trim()); cur=''; }
      else cur+=line[c];
    }
    vals.push(cur.trim());
    if(vals.length<2) continue;
    const obj={};
    headers.forEach((h,j)=>{ obj[h]=vals[j]||''; });
    obj.label    = obj['title']||obj['label']||'';
    obj.body     = obj['content']||obj['body']||'';
    obj.link     = obj['linkoptional']||obj['link']||'';
    obj.name     = obj['nameorpseudonym']||obj['name']||'';
    obj.instagram= obj['instagramhandle']||obj['instagram']||'';
    obj.credited = (obj['iwanttobepubliclycreditedformywork']||'').toLowerCase();
    obj.keywords = obj['keywords']||'';
    obj.responseto=obj['responseto']||obj['inresponseto']||'';
    obj.id=obj['id']||'';
    obj.type     = obj['typeofsubmission']||obj['type']||'submission';
    const pub=(obj.publish||'').toLowerCase();
    if(obj.label&&pub==='true') rows.push(obj);
  }
  return rows;
}

// ── NODES + EDGES ──────────────────────────────────────────────────────────
var nodes=[], edges=[], nodeById={};

function buildGraph(entries){
  nodes=[]; edges=[]; nodeById={};

  entries.forEach((e,i)=>{
    const id=e.id||makeId(e,i);
    const node={
      id, index:i,
      label: e.label,
      body:  e.body,
      name:  e.credited!=='no'?e.name:'',
      instagram: e.instagram,
      keywords:  e.keywords,
      responseto:e.responseto.trim(),
      type:  e.type,
      link:  e.link,
      _entry:e
    };
    nodes.push(node);
    nodeById[id]=node;
  });

  // also index by label for responseto matching
  const byLabel={};
  nodes.forEach(n=>{ byLabel[(n.label||'').toLowerCase().trim()]=n; });

  nodes.forEach(n=>{
    if(!n.responseto) return;
    // match by id first, then title
    const target=nodeById[n.responseto.toLowerCase()]||byLabel[n.responseto.toLowerCase()];
    if(target&&target.id!==n.id) edges.push({source:n.id,target:target.id});
  });
}

// ── TRANSCRIPT VIEW ────────────────────────────────────────────────────────
function makeSep(){
  const c=['.','·',':','~',"'"];
  let s=''; while(s.length<50) s+=Math.random()<0.3?'·:·':c[Math.floor(Math.random()*c.length)];
  return s.slice(0,50);
}

function renderTranscript(){
  const inner=document.getElementById('transcript-inner');
  inner.innerHTML='';

  // build response map: targetId -> [sourceIds]
  const responses={};
  edges.forEach(e=>{
    if(!responses[e.target]) responses[e.target]=[];
    responses[e.target].push(e.source);
  });

  nodes.forEach((node,i)=>{
    const el=document.createElement('div');
    el.className='zt-entry'; el.id='zt-'+node.id;

    // ID row
    const idRow=document.createElement('div');
    idRow.className='zt-id';
    const idSpan=document.createElement('span');
    idSpan.className='zid'; idSpan.textContent='#'+node.id;
    idSpan.title='click to copy'; 
    idSpan.addEventListener('click',()=>{ navigator.clipboard&&navigator.clipboard.writeText('#'+node.id); idSpan.textContent='copied!'; setTimeout(()=>idSpan.textContent='#'+node.id,1200); });
    const typeSpan=document.createElement('span');
    typeSpan.className='zt-type'; typeSpan.textContent=node.type||'submission';
    idRow.appendChild(idSpan); idRow.appendChild(typeSpan);
    el.appendChild(idRow);

    // links to
    if(node.responseto){
      const rt=nodeById[node.responseto]||Object.values(nodeById).find(n=>(n.label||'').toLowerCase()===node.responseto.toLowerCase());
      if(rt){
        const lt=document.createElement('div');
        lt.className='zt-links-to';
        lt.innerHTML='↳ in response to ';
        const a=document.createElement('a');
        a.textContent='#'+rt.id+' '+rt.label.slice(0,30);
        a.addEventListener('click',()=>scrollToNode(rt.id));
        lt.appendChild(a);
        el.appendChild(lt);
      }
    }

    // title
    if(node.label){
      const t=document.createElement('div');
      t.className='zt-title'; t.textContent=node.label;
      el.appendChild(t);
    }

    // body
    if(node.body){
      const b=document.createElement('div');
      b.className='zt-body'; b.textContent=node.body;
      el.appendChild(b);
    }

    // meta
    const meta=document.createElement('div');
    meta.className='zt-meta';
    if(node.name){ const s=document.createElement('span'); s.className='author'; s.textContent=node.name; meta.appendChild(s); }
    if(node.keywords){
      const kw=document.createElement('span');
      kw.className='keywords';
      kw.textContent=node.keywords.split(',').map(k=>k.trim()).filter(Boolean).join(' · ');
      meta.appendChild(kw);
    }
    if(node.link){
      const lk=document.createElement('a');
      lk.href=node.link; lk.target='_blank'; lk.rel='noopener';
      lk.style.cssText='font-family:Courier New,monospace;font-size:0.6rem;color:#bbb;';
      lk.textContent='link →'; meta.appendChild(lk);
    }
    el.appendChild(meta);

    // responses
    const resp=responses[node.id];
    if(resp&&resp.length>0){
      const rd=document.createElement('div');
      rd.className='zt-responses';
      rd.appendChild(document.createTextNode('responded to by '));
      resp.forEach(rid=>{
        const rn=nodeById[rid];
        if(!rn) return;
        const a=document.createElement('a');
        a.textContent='#'+rid;
        a.title=rn.label;
        a.addEventListener('click',()=>scrollToNode(rid));
        rd.appendChild(a);
      });
      el.appendChild(rd);
    }

    inner.appendChild(el);

    if(i<nodes.length-1){
      const sep=document.createElement('div');
      sep.className='zt-sep'; sep.textContent=makeSep();
      inner.appendChild(sep);
    }
  });
}

function scrollToNode(id){
  const el=document.getElementById('zt-'+id);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── WEB VIEW ───────────────────────────────────────────────────────────────
var simulation=null;

function renderWeb(){
  const svg=d3.select('#web-svg');
  svg.selectAll('*').remove();

  const W=document.getElementById('view-web').offsetWidth;
  const H=document.getElementById('view-web').offsetHeight;
  svg.attr('viewBox',`0 0 ${W} ${H}`);

  // build d3 data
  const d3nodes=nodes.map(n=>({...n,x:W/2+(Math.random()-0.5)*300,y:H/2+(Math.random()-0.5)*300}));
  const idToD3={};
  d3nodes.forEach(n=>idToD3[n.id]=n);
  const d3edges=edges.map(e=>({source:idToD3[e.source],target:idToD3[e.target]})).filter(e=>e.source&&e.target);

  const g=svg.append('g');

  // zoom
  svg.call(d3.zoom().scaleExtent([0.3,4]).on('zoom',evt=>g.attr('transform',evt.transform)));

  // edges
  const link=g.append('g').selectAll('line').data(d3edges).enter().append('line').attr('class','link-line');

  // nodes
  const node=g.append('g').selectAll('g').data(d3nodes).enter().append('g').attr('class','node-g').style('cursor','pointer');

  // radius based on connections — larger on mobile
  const isMobile = window.innerWidth <= 600;
  const BASE_R = isMobile ? 38 : 32;
  const MAX_R  = isMobile ? 62 : 52;
  function nodeR(d){
    const conn = edges.filter(e=>e.source===d.id||e.target===d.id).length;
    return Math.max(BASE_R, Math.min(MAX_R, BASE_R + conn * (isMobile ? 5 : 4)));
  }

  node.append('circle').attr('class','node-circle').attr('r', nodeR);
  // invisible larger hit area for mobile touch
  node.append('circle').attr('r', d=>nodeR(d)+8).attr('fill','transparent').attr('stroke','none');

  // wrap text inside circle using tspans
  const FONT_PX = isMobile ? 11 : 10;
  const CHAR_W  = FONT_PX * 0.62;
  const LINE_H  = FONT_PX * 1.4;

  node.append('text')
    .attr('class','node-label')
    .attr('text-anchor','middle')
    .each(function(d){
      const r = nodeR(d) - 7;
      const maxLineW = r * 1.7;
      const words = (d.label || d.id).split(' ');
      const lines = [];
      let cur = '';
      words.forEach(w => {
        const test = cur ? cur + ' ' + w : w;
        if(test.length * CHAR_W > maxLineW && cur){
          lines.push(cur); cur = w;
        } else { cur = test; }
      });
      if(cur) lines.push(cur);
      const maxLines = Math.max(2, Math.floor((r * 1.8) / LINE_H));
      if(lines.length > maxLines){
        lines.splice(maxLines);
        lines[maxLines-1] = lines[maxLines-1].replace(/\s*\S+$/, '…');
      }
      const startY = -(lines.length - 1) * LINE_H / 2;
      lines.forEach((line, i) => {
        d3.select(this).append('tspan')
          .attr('x', 0)
          .attr('dy', i === 0 ? startY : LINE_H)
          .text(line);
      });
    });

  node.call(d3.drag()
    .on('start',(evt,d)=>{
      if(!evt.active) simulation.alphaTarget(0.3).restart();
      d.fx=d.x; d.fy=d.y;
      const hint=document.getElementById('web-hint');
      if(hint) hint.style.opacity='0';
    })
    .on('drag', (evt,d)=>{ d.fx=evt.x; d.fy=evt.y; })
    .on('end',  (evt,d)=>{ if(!evt.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
  );

  node.on('click',(evt,d)=>{ evt.stopPropagation(); openPanel(d); highlightNode(d,link,node); });
  svg.on('click',()=>{ closePanel(); clearHighlight(link,node); });

  simulation=d3.forceSimulation(d3nodes)
    .force('link',d3.forceLink(d3edges).distance(isMobile?160:140).strength(0.4))
    .force('charge',d3.forceManyBody().strength(isMobile?-350:-280))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collision',d3.forceCollide(d=>nodeR(d)+10))
    .on('tick',()=>{
      link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      node.attr('transform',d=>`translate(${d.x},${d.y})`);
    });
}

function highlightNode(d, link, node){
  const connected=new Set([d.id]);
  edges.forEach(e=>{ if(e.source===d.id) connected.add(e.target); if(e.target===d.id) connected.add(e.source); });
  node.select('circle').classed('highlighted',n=>connected.has(n.id));
  node.select('text').classed('highlighted',n=>connected.has(n.id));
  link.classed('highlighted',e=>e.source.id===d.id||e.target.id===d.id);
}
function clearHighlight(link,node){
  node.select('circle').classed('highlighted',false);
  node.select('text').classed('highlighted',false);
  link.classed('highlighted',false);
}

// ── SIDE PANEL ────────────────────────────────────────────────────────────
function openPanel(node){
  const responses={};
  edges.forEach(e=>{ if(!responses[e.target]) responses[e.target]=[]; responses[e.target].push(e.source); });

  document.getElementById('sp-id').textContent='#'+node.id;
  document.getElementById('sp-type').textContent=node.type||'submission';

  const linksEl=document.getElementById('sp-links');
  linksEl.innerHTML='';
  if(node.responseto){
    const rt=nodeById[node.responseto]||Object.values(nodeById).find(n=>(n.label||'').toLowerCase()===node.responseto.toLowerCase());
    if(rt){ linksEl.innerHTML='↳ in response to '; const a=document.createElement('a'); a.textContent='#'+rt.id; a.addEventListener('click',()=>openPanel(rt)); linksEl.appendChild(a); }
  }

  document.getElementById('sp-title').textContent=node.label||'';
  document.getElementById('sp-body').textContent=node.body||'';

  const metaEl=document.getElementById('sp-meta');
  metaEl.innerHTML='';
  if(node.name){ const s=document.createElement('span'); s.className='author'; s.textContent=node.name; metaEl.appendChild(s); }
  if(node.keywords){ const k=document.createElement('span'); k.textContent=node.keywords.split(',').map(k=>k.trim()).join(' · '); metaEl.appendChild(k); }

  const respEl=document.getElementById('sp-responses');
  respEl.innerHTML='';
  const resp=responses[node.id];
  if(resp&&resp.length>0){
    respEl.appendChild(document.createTextNode('responded to by '));
    resp.forEach(rid=>{ const rn=nodeById[rid]; if(!rn) return; const a=document.createElement('a'); a.textContent='#'+rid; a.addEventListener('click',()=>openPanel(rn)); respEl.appendChild(a); });
  }

  document.getElementById('side-panel').classList.add('open');
}
function closePanel(){ document.getElementById('side-panel').classList.remove('open'); }
document.getElementById('sp-close').addEventListener('click',closePanel);

// ── VIEW SWITCHING ─────────────────────────────────────────────────────────
var currentView='transcript';
function showView(v){
  currentView=v;
  document.getElementById('view-transcript').style.display=v==='transcript'?'block':'none';
  document.getElementById('view-web').style.display=v==='web'?'block':'none';
  document.getElementById('btn-transcript').classList.toggle('active',v==='transcript');
  document.getElementById('btn-web').classList.toggle('active',v==='web');
  if(v==='web'&&nodes.length>0) renderWeb();
  if(v==='transcript') closePanel();
}
document.getElementById('btn-transcript').addEventListener('click',()=>showView('transcript'));
document.getElementById('btn-web').addEventListener('click',()=>showView('web'));

// ── LOAD DATA ──────────────────────────────────────────────────────────────
const loadingEl=document.getElementById('loading');
const timeout=setTimeout(()=>{ loadingEl.textContent='could not load data. check connection.'; loadingEl.style.color='#c00'; },8000);

fetch(PROXY)
  .then(r=>r.text())
  .then(csv=>{
    clearTimeout(timeout);
    loadingEl.style.display='none';
    const entries=parseCSV(csv);
    buildGraph(entries);
    renderTranscript();
    showView('transcript');
    document.getElementById('view-transcript').style.display='block';
  })
  .catch(err=>{
    clearTimeout(timeout);
    loadingEl.textContent='could not load: '+err.message;
    loadingEl.style.color='#c00';
  });
</script>
</body>
</html>
